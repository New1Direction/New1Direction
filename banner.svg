<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" fill="none" role="img" aria-label="i like computers — Serial Experiments Lain inspired banner">
  <title>i like computers</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07070d"/>
      <stop offset="0.42" stop-color="#171228"/>
      <stop offset="0.72" stop-color="#3a1d2c"/>
      <stop offset="0.9" stop-color="#6d2531"/>
      <stop offset="1" stop-color="#8a2d2f"/>
    </linearGradient>
    <radialGradient id="horizon" cx="0.5" cy="1" r="0.85">
      <stop offset="0" stop-color="#e0553f" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#b91c1c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wired" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wiredCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a5f3fc" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="eye" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="eyeHalo" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="6"/></filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="380" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- dusk sky + horizon glow -->
    <rect width="1200" height="380" fill="url(#sky)"/>
    <ellipse cx="600" cy="362" rx="780" ry="230" fill="url(#horizon)"/>

    <!-- (character + glow removed) -->

    <!-- power lines (the literal powerline) -->
    <g stroke="#04040a" stroke-width="2.2" fill="none" opacity="0.95">
      <path d="M-20 96 Q 320 150 640 104"/>
      <path d="M-20 112 Q 320 172 640 120"/>
      <path d="M640 104 Q 762 152 882 110"/>
      <path d="M640 120 Q 762 170 882 126"/>
      <path d="M882 110 Q 1044 150 1230 94"/>
      <path d="M882 126 Q 1044 168 1230 110"/>
    </g>
    <!-- utility poles -->
    <g fill="#04040a">
      <rect x="635" y="86" width="9" height="250"/>
      <rect x="606" y="104" width="67" height="6"/>
      <rect x="612" y="126" width="55" height="6"/>
      <rect x="874" y="92" width="8" height="244"/>
      <rect x="848" y="108" width="60" height="5"/>
    </g>
    <!-- ground -->
    <rect x="0" y="330" width="1200" height="50" fill="#04040a" opacity="0.9"/>

    <!-- (character removed — scene only) -->

    <!-- CRT scanlines -->
    <rect width="1200" height="380" fill="url(#scan)"/>

    <!-- title with RGB-split glitch -->
    <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="58" letter-spacing="-1">
      <text x="67" y="208" fill="#22d3ee" fill-opacity="0.6">i like computers<animate attributeName="x" values="67;67;71;64;67;67" keyTimes="0;0.86;0.89;0.92;0.95;1" dur="6s" repeatCount="indefinite"/></text>
      <text x="73" y="208" fill="#ef4444" fill-opacity="0.6">i like computers<animate attributeName="x" values="73;73;69;76;73;73" keyTimes="0;0.86;0.89;0.92;0.95;1" dur="6s" repeatCount="indefinite"/></text>
      <text x="70" y="208" fill="#f5f3f4">i like computers</text>
    </g>

    <!-- (top captions removed) -->

    <!-- (status strip removed) -->
  </g>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="14" fill="none" stroke="#000000" stroke-opacity="0.6"/>
</svg>
