<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" fill="none" role="img" aria-label="i like computers — Serial Experiments Lain inspired banner">
  <title>i like computers</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07070d"/>
      <stop offset="0.42" stop-color="#171228"/>
      <stop offset="0.72" stop-color="#3a1d2c"/>
      <stop offset="0.9" stop-color="#6d2531"/>
      <stop offset="1" stop-color="#8a2d2f"/>
    </linearGradient>
    <radialGradient id="horizon" cx="0.5" cy="1" r="0.85">
      <stop offset="0" stop-color="#e0553f" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#b91c1c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#b91c1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wired" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wiredCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a5f3fc" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="eye" x="-200%" y="-200%" width="500%" height="500%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="eyeHalo" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="6"/></filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="380" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- dusk sky + horizon glow -->
    <rect width="1200" height="380" fill="url(#sky)"/>
    <ellipse cx="600" cy="362" rx="780" ry="230" fill="url(#horizon)"/>

    <!-- the Wired: cold glow behind the watcher -->
    <circle cx="1013" cy="200" r="178" fill="url(#wired)"/>
    <circle cx="1013" cy="182" r="104" fill="url(#wiredCore)"/>

    <!-- power lines (the literal powerline) -->
    <g stroke="#04040a" stroke-width="2.2" fill="none" opacity="0.95">
      <path d="M-20 96 Q 320 150 640 104"/>
      <path d="M-20 112 Q 320 172 640 120"/>
      <path d="M640 104 Q 762 152 882 110"/>
      <path d="M640 120 Q 762 170 882 126"/>
      <path d="M882 110 Q 1044 150 1230 94"/>
      <path d="M882 126 Q 1044 168 1230 110"/>
    </g>
    <!-- utility poles -->
    <g fill="#04040a">
      <rect x="635" y="86" width="9" height="250"/>
      <rect x="606" y="104" width="67" height="6"/>
      <rect x="612" y="126" width="55" height="6"/>
      <rect x="874" y="92" width="8" height="244"/>
      <rect x="848" y="108" width="60" height="5"/>
    </g>
    <!-- ground -->
    <rect x="0" y="330" width="1200" height="50" fill="#04040a" opacity="0.9"/>

    <!-- character: hooded, bear-eared silhouette (Lain bear-hood homage) -->
    <g>
      <path d="M905 336 C 905 268 950 250 1013 250 C 1076 250 1121 268 1121 336 Z" fill="#070709"/>
      <path d="M945 196 C 945 138 982 110 1013 110 C 1044 110 1082 138 1082 196 C 1082 236 1050 257 1013 257 C 976 257 945 236 945 196 Z" fill="#0a0a0e"/>
      <circle cx="958" cy="117" r="25" fill="#0a0a0e"/>
      <circle cx="1068" cy="117" r="25" fill="#0a0a0e"/>
      <circle cx="958" cy="117" r="11" fill="#17171f"/>
      <circle cx="1068" cy="117" r="11" fill="#17171f"/>
      <ellipse cx="1013" cy="197" rx="47" ry="51" fill="#050507"/>
      <!-- cyan rim light (Wired backlight catching the edge) -->
      <path d="M945 200 C 945 138 982 110 1013 110 C 1044 110 1082 138 1082 200" stroke="#7df0ff" stroke-opacity="0.78" stroke-width="2.6" fill="none"/>
      <path d="M935 119 a 24 24 0 0 1 46 0" stroke="#7df0ff" stroke-opacity="0.6" stroke-width="2" fill="none"/>
      <path d="M1045 119 a 24 24 0 0 1 46 0" stroke="#7df0ff" stroke-opacity="0.6" stroke-width="2" fill="none"/>
      <path d="M905 330 C 905 270 950 251 1013 250" stroke="#67e8f9" stroke-opacity="0.32" stroke-width="2.2" fill="none"/>
      <!-- warm rim on the right edge (horizon catching) -->
      <path d="M1082 200 C 1082 150 1055 120 1020 112" stroke="#fb9a9a" stroke-opacity="0.32" stroke-width="2" fill="none"/>
      <!-- glowing eyes -->
      <g>
        <g filter="url(#eyeHalo)">
          <ellipse cx="997" cy="196" rx="9" ry="12" fill="#ff3b3b"/>
          <ellipse cx="1031" cy="196" rx="9" ry="12" fill="#ff3b3b"/>
        </g>
        <ellipse cx="997" cy="196" rx="6" ry="9" fill="#ff6b6b"/>
        <ellipse cx="1031" cy="196" rx="6" ry="9" fill="#ff6b6b"/>
        <ellipse cx="997" cy="195" rx="2.6" ry="4" fill="#fff0f0"/>
        <ellipse cx="1031" cy="195" rx="2.6" ry="4" fill="#fff0f0"/>
        <animate attributeName="opacity" values="1;0.55;1;0.8;1" dur="4s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- CRT scanlines -->
    <rect width="1200" height="380" fill="url(#scan)"/>

    <!-- title with RGB-split glitch -->
    <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="58" letter-spacing="-1">
      <text x="67" y="208" fill="#22d3ee" fill-opacity="0.6">i like computers<animate attributeName="x" values="67;67;71;64;67;67" keyTimes="0;0.86;0.89;0.92;0.95;1" dur="6s" repeatCount="indefinite"/></text>
      <text x="73" y="208" fill="#ef4444" fill-opacity="0.6">i like computers<animate attributeName="x" values="73;73;69;76;73;73" keyTimes="0;0.86;0.89;0.92;0.95;1" dur="6s" repeatCount="indefinite"/></text>
      <text x="70" y="208" fill="#f5f3f4">i like computers</text>
    </g>

    <!-- Lain homage captions -->
    <text x="70" y="58" font-family="ui-monospace, Menlo, monospace" font-size="14" letter-spacing="3" fill="#9aa3c7" fill-opacity="0.85">[ THE WIRED ]</text>
    <text x="72" y="240" font-family="ui-monospace, Menlo, monospace" font-size="14" letter-spacing="2" fill="#e7a3a3" fill-opacity="0.85">present day &#183; present time</text>

    <!-- powerline status strip (Lain palette) -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" font-weight="700">
      <rect x="0" y="338" width="1200" height="42" fill="#050507"/>
      <rect x="40" y="345" width="200" height="28" fill="#1f2937"/>
      <rect x="240" y="345" width="96" height="28" fill="#7f1d1d"/>
      <rect x="336" y="345" width="208" height="28" fill="#111827"/>
      <rect x="544" y="345" width="150" height="28" fill="#0e7490"/>
      <path d="M240 345 L258 359 L240 373 Z" fill="#1f2937"/>
      <path d="M336 345 L354 359 L336 373 Z" fill="#7f1d1d"/>
      <path d="M544 345 L562 359 L544 373 Z" fill="#111827"/>
      <path d="M694 345 L712 359 L694 373 Z" fill="#0e7490"/>
      <text x="58" y="365" fill="#cbd5e1">~/new1direction</text>
      <text x="266" y="365" fill="#fecaca">wired</text>
      <text x="360" y="365" fill="#e2e8f0">rust &#183; python &#183; ts</text>
      <text x="568" y="365" fill="#cffafe">&#10003; verifiable</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="379" rx="14" fill="none" stroke="#000000" stroke-opacity="0.6"/>
</svg>
