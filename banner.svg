<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="i like computers — verifiable AI">
  <title>i like computers — verifiable AI</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#140d2b"/>
      <stop offset="1" stop-color="#1b1033"/>
    </linearGradient>
    <radialGradient id="b1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glasshi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <clipPath id="card">
      <rect x="40" y="40" width="1120" height="240" rx="26"/>
    </clipPath>
  </defs>

  <!-- base panel -->
  <rect x="0" y="0" width="1200" height="320" rx="28" fill="url(#bg)"/>

  <!-- colorful blobs behind the glass -->
  <g clip-path="url(#card)">
    <circle cx="200" cy="80" r="230" fill="url(#b1)" filter="url(#blur)"/>
    <circle cx="1040" cy="250" r="270" fill="url(#b2)" filter="url(#blur)"/>
    <circle cx="640" cy="300" r="210" fill="url(#b3)" filter="url(#blur)">
      <animate attributeName="cx" values="640;730;640" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- frosted glass card -->
  <g clip-path="url(#card)">
    <rect x="40" y="40" width="1120" height="240" rx="26" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="40" y="40" width="1120" height="240" rx="26" fill="url(#glasshi)"/>
    <rect x="40" y="40" width="1120" height="240" filter="url(#grain)" opacity="0.035"/>
    <!-- slow sheen sweep -->
    <rect x="-420" y="40" width="420" height="240" fill="url(#sheen)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1640 0" dur="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="40.5" y="40.5" width="1119" height="239" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>

  <!-- title + bio -->
  <text x="80" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1.2">i like computers</text>
  <text x="82" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="500" fill="#c7d2fe" fill-opacity="0.92">— mostly the ones that can prove what they did.</text>

  <!-- powerline strip -->
  <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">
    <!-- segment fills -->
    <rect x="80" y="206" width="216" height="46" rx="8" fill="#2563eb"/>
    <rect x="296" y="206" width="96"  height="46" fill="#4f46e5"/>
    <rect x="392" y="206" width="210" height="46" fill="#1e293b"/>
    <rect x="602" y="206" width="156" height="46" fill="#059669"/>
    <!-- chevron separators (each in its own segment colour, overlapping the next) -->
    <path d="M296 206 L316 229 L296 252 Z" fill="#2563eb"/>
    <path d="M392 206 L412 229 L392 252 Z" fill="#4f46e5"/>
    <path d="M602 206 L622 229 L602 252 Z" fill="#1e293b"/>
    <path d="M758 206 L778 229 L758 252 Z" fill="#059669"/>
    <!-- segment labels -->
    <text x="100" y="235" fill="#eff6ff">~/new1direction</text>
    <text x="322" y="235" fill="#eef2ff">main</text>
    <text x="416" y="235" fill="#e2e8f0">rust · python · ts</text>
    <text x="626" y="235" fill="#ecfdf5">✓ verifiable</text>
  </g>
</svg>
